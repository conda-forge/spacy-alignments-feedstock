{% set version = "0.9.2" %}

package:
  name: spacy-alignments
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/spacy-alignments/spacy_alignments-{{ version }}.tar.gz
  sha256: 1c50b50d261550d3220887cfd0a12a6e85e709d815a66949f6b92340e4278d69


build:
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - {{ compiler('rust') }}
  host:
    - pip
    - python
    - setuptools
    - setuptools-rust
  run:
    - python

test:
  requires:
    - pytest
    - hypothesis
  imports:
    - spacy_alignments
  commands:
    - python -m pytest --tb=native --pyargs spacy_alignments

about:
  home: https://spacy.io/
  license: MIT
  license_file: LICENSE
  summary: Align tokenizations for spaCy + transformers
  description: |
    A spaCy package for Yohei Tamura's Rust tokenizations library.
  doc_url: https://github.com/explosion/spacy-alignments
  dev_url: https://github.com/explosion/spacy-alignments

extra:
  recipe-maintainers:
    - conda-forge/spacy
